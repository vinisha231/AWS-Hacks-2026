AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Compass — Benefits Navigator Backend

Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 256
    CodeUri: .
    Environment:
      Variables:
        AURORA_HOST: !Ref AuroraHost
        AURORA_DB: !Ref AuroraDb
        AURORA_USER: !Ref AuroraUser
        AURORA_PASSWORD: !Ref AuroraPassword
        S3_BUCKET: !Ref DocumentsBucket
        SNS_TOPIC_ARN: !Ref ReminderTopic

Parameters:
  AuroraHost:
    Type: String
    Default: ""
  AuroraDb:
    Type: String
    Default: benefits_navigator
  AuroraUser:
    Type: String
    Default: ""
  AuroraPassword:
    Type: String
    NoEcho: true
    Default: ""
  PinpointAppId:
    Type: String
    Default: ""

Resources:

  # S3 bucket for documents
  DocumentsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # SNS topic for renewal reminders
  ReminderTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: compass-renewal-reminders

  # API Gateway
  CompassApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: "'GET,POST,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization,x-api-key'"
        AllowOrigin: "'*'"

  # Lambda: Translate
  TranslateFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: translate.handler.lambda_handler
      Policies:
        - TranslateReadOnly
      Events:
        TranslatePost:
          Type: Api
          Properties:
            RestApiId: !Ref CompassApi
            Path: /translate
            Method: post
        TranslateLanguages:
          Type: Api
          Properties:
            RestApiId: !Ref CompassApi
            Path: /translate/languages
            Method: get
        TranslateOptions:
          Type: Api
          Properties:
            RestApiId: !Ref CompassApi
            Path: /translate
            Method: options

  # Lambda: Intake
  IntakeFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: intake.handler.lambda_handler
      Policies:
        - AmazonBedrockFullAccess
        - TranslateReadOnly
        - AmazonRDSDataFullAccess
      Events:
        IntakePost:
          Type: Api
          Properties:
            RestApiId: !Ref CompassApi
            Path: /intake
            Method: post

  # Lambda: Eligibility
  EligibilityFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: eligibility.handler.lambda_handler
      Policies:
        - AmazonRDSDataFullAccess
      Events:
        EligibilityPost:
          Type: Api
          Properties:
            RestApiId: !Ref CompassApi
            Path: /eligibility
            Method: post

  # Lambda: Application
  ApplicationFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: application.handler.lambda_handler
      Policies:
        - AmazonRDSDataFullAccess
        - AmazonS3FullAccess
        - AmazonSNSFullAccess
      Events:
        ApplicationAction:
          Type: Api
          Properties:
            RestApiId: !Ref CompassApi
            Path: /application/{action}
            Method: post
        ApplicationStatus:
          Type: Api
          Properties:
            RestApiId: !Ref CompassApi
            Path: /application/status
            Method: get

  # Lambda: Chatbot
  ChatbotFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: chatbot.handler.lambda_handler
      Timeout: 60
      Policies:
        - AmazonBedrockFullAccess
        - TranslateReadOnly
      Events:
        ChatbotPost:
          Type: Api
          Properties:
            RestApiId: !Ref CompassApi
            Path: /chatbot
            Method: post
        ChatbotOptions:
          Type: Api
          Properties:
            RestApiId: !Ref CompassApi
            Path: /chatbot
            Method: options

  # Lambda: Advocate
  AdvocateFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: lambda.advocate.handler.lambda_handler
      Timeout: 60
      Policies:
        - AmazonBedrockFullAccess
        - TranslateReadOnly
      Events:
        AdvocatePost:
          Type: Api
          Properties:
            RestApiId: !Ref CompassApi
            Path: /advocate
            Method: post
        AdvocateOptions:
          Type: Api
          Properties:
            RestApiId: !Ref CompassApi
            Path: /advocate
            Method: options

  # Lambda: SMS Fallback
  SmsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: sms.handler.lambda_handler
      Timeout: 60
      Environment:
        Variables:
          PINPOINT_APP_ID: !Ref PinpointAppId
      Policies:
        - AmazonRDSDataFullAccess
        - Statement:
            - Effect: Allow
              Action:
                - mobiletargeting:SendMessages
                - mobiletargeting:GetEndpoint
                - mobiletargeting:UpdateEndpoint
              Resource: "*"
      Events:
        SmsInbound:
          Type: SNS
          Properties:
            Topic: !Ref SmsInboundTopic

  SmsInboundTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: compass-sms-inbound

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${CompassApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
  DocumentsBucket:
    Description: S3 bucket for documents
    Value: !Ref DocumentsBucket
  ReminderTopicArn:
    Description: SNS topic for renewal reminders
    Value: !Ref ReminderTopic
