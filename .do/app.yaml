name: flare-app
region: nyc

services:
  - name: api
    source_dir: /server
    github:
      repo: vinisha231/UWBHacks2026
      branch: main
      deploy_on_push: true
    build_command: npm install
    run_command: npm start
    http_port: 3001
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /api
      - path: /socket.io
    health_check:
      http_path: /health
    envs:
      - key: PORT
        value: "3001"
      - key: GEMINI_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: ELEVENLABS_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: SUPABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: SUPABASE_SERVICE_ROLE_KEY
        scope: RUN_TIME
        type: SECRET
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET

static_sites:
  - name: frontend
    source_dir: /
    github:
      repo: vinisha231/UWBHacks2026
      branch: main
      deploy_on_push: true
    build_command: npm install && npm run build
    output_dir: dist
    index_document: index.html
    error_document: index.html
    routes:
      - path: /
    envs:
      - key: VITE_API_URL
        scope: BUILD_TIME
        value: ${api.PUBLIC_URL}
      - key: VITE_SUPABASE_URL
        scope: BUILD_TIME
        type: SECRET
      - key: VITE_SUPABASE_ANON_KEY
        scope: BUILD_TIME
        type: SECRET
      - key: VITE_GEMINI_API_KEY
        scope: BUILD_TIME
        type: SECRET
